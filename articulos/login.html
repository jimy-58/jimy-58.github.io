<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 TU CONFIG (la que ya tienes)
const firebaseConfig = {
  apiKey: "AIzaSyCGS7KkAV4IGCuL2M1YzY-L6T8BCCCO9Us",
  authDomain: "curso-excel-e9718.firebaseapp.com",
  projectId: "curso-excel-e9718",
  storageBucket: "curso-excel-e9718.firebasestorage.app",
  messagingSenderId: "279334418560",
  appId: "1:279334418560:web:63b7408208126c14390e65"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Bienvenido 🔥");
    window.location.href = "index.html";
  } catch (error) {
    alert(error.message);
  }
};

// REGISTRO
window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Usuario creado 🚀");
  } catch (error) {
    alert(error.message);
  }
};

</script>

</body>
</html>
